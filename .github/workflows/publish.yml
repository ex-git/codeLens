name: publish

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package.json version
        run: |
          set -euo pipefail
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG"
          echo "git tag version:       $TAG"
          if [ "$PKG" != "$TAG" ]; then
            echo "::error::Version mismatch — bump package.json to $TAG before tagging."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Verify build artifacts exist
        run: |
          test -f build/src/server.js
          test -f build/src/db/schema.sql
          test -f build/src/context/schema.sql

      - name: Use Trusted Publisher-capable npm
        run: |
          npm install -g npm@latest
          npm --version

      - run: npm publish --provenance --access public