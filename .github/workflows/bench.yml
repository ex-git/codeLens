name: bench

on:
  pull_request:
  push:
    branches: [main]

jobs:
  benchmark:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci --legacy-peer-deps
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - name: Run benchmark gate
        run: npm run benchmark
      - name: Run quality harness (non-blocking)
        continue-on-error: true
        run: npm run quality
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ matrix.os }}
          path: bench/results/