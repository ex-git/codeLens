<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" font-family="SF Mono, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="lens" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#7ee787"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- subtle grid -->
  <g stroke="#1f2630" stroke-width="1">
    <path d="M0 160 H1280 M0 320 H1280 M0 480 H1280"/>
    <path d="M160 0 V640 M320 0 V640 M480 0 V640 M640 0 V640 M800 0 V640 M960 0 V640 M1120 0 V640"/>
  </g>

  <!-- relation graph (left side) -->
  <g stroke="#30363d" stroke-width="2" fill="none">
    <path d="M210 200 L360 300"/>
    <path d="M360 300 L520 220"/>
    <path d="M360 300 L520 400"/>
    <path d="M520 220 L680 180"/>
    <path d="M520 400 L680 460"/>
    <path d="M520 220 L520 400" stroke-dasharray="6 6"/>
  </g>
  <g>
    <circle cx="210" cy="200" r="14" fill="#1f6feb"/>
    <circle cx="360" cy="300" r="18" fill="url(#lens)"/>
    <circle cx="520" cy="220" r="14" fill="#7ee787"/>
    <circle cx="520" cy="400" r="14" fill="#f0883e"/>
    <circle cx="680" cy="180" r="11" fill="#a371f7"/>
    <circle cx="680" cy="460" r="11" fill="#a371f7"/>
  </g>
  <g fill="#8b949e" font-size="13">
    <text x="150" y="240">auth.ts</text>
    <text x="300" y="340">session.ts</text>
    <text x="470" y="260">login.ts</text>
    <text x="470" y="440">session.test.ts</text>
  </g>

  <!-- code pane (right) -->
  <g transform="translate(760,150)">
    <rect width="440" height="340" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
    <g transform="translate(22,26)">
      <circle cx="0" cy="0" r="6" fill="#ff5f56"/>
      <circle cx="18" cy="0" r="6" fill="#ffbd2e"/>
      <circle cx="36" cy="0" r="6" fill="#27c93f"/>
    </g>
    <g font-size="15" fill="#c9d1d9">
      <text x="22" y="80"><tspan fill="#8b949e"> 1</tspan>  <tspan fill="#7ee787">export function</tspan> <tspan fill="#58a6ff">validateSession</tspan>() {</text>
      <text x="22" y="108"><tspan fill="#8b949e"> 2</tspan>    <tspan fill="#ff7b72">const</tspan> u = <tspan fill="#79c0ff">await</tspan> db.find(...)</text>
      <text x="22" y="136"><tspan fill="#8b949e"> 3</tspan>    <tspan fill="#ff7b72">if</tspan> (!u) <tspan fill="#ff7b72">return</tspan> <tspan fill="#79c0ff">null</tspan></text>
      <text x="22" y="164"><tspan fill="#8b949e"> 4</tspan>    <tspan fill="#8b949e">// tests: session.test.ts</tspan></text>
      <text x="22" y="192"><tspan fill="#8b949e"> 5</tspan>    <tspan fill="#ff7b72">return</tspan> u</text>
      <text x="22" y="220"><tspan fill="#8b949e"> 6</tspan>  }</text>
    </g>
  </g>

  <!-- the lens -->
  <g transform="translate(360,300)">
    <circle cx="0" cy="0" r="150" fill="url(#glow)"/>
    <circle cx="0" cy="0" r="92" fill="none" stroke="url(#lens)" stroke-width="8" opacity="0.9"/>
    <line x1="70" y1="70" x2="130" y2="130" stroke="url(#lens)" stroke-width="14" stroke-linecap="round"/>
  </g>

  <!-- wordmark -->
  <g fill="#e6edf3">
    <text x="760" y="540" font-size="46" font-weight="700">CodeLens</text>
    <text x="760" y="572" font-size="18" fill="#8b949e">branch-aware code search &amp; relation graph</text>
  </g>
</svg>